<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>flexbox</title>
         <style>
            .container {
                font-size: 20px;
                background-color: aqua;
                display: flex;
                flex-direction: column; /* row, column, row-reverse, column-reverse */

            }
            .container > div {
                background-color: tomato;
                margin: 10px;
                padding: 20px;
                
            }
        </style>
    </head>
    <body>
        <h1>flex box </h1>
        <div class="container">
            
            <div>item 1 ilove you</div>
            <div>item2</div>
            <div>item3</div>
            <div>item4</div>
        </div>
    </body>
</html>
