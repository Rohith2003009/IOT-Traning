<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Grid Model</title>
         <style>
            .container {
                font-size: 30px;
                display: grid;
                grid-template-columns: 100px 100px 100px 100px; /* 1fr 1fr 1fr */
                grid-template-rows: 100px 100px; /* 1fr 1fr */
                background-color: aqua;
                border: 3px solid black;

            }
            .container > div {
                font-size: 18px;
                background-color: tomato;
                box-sizing: border-box;
                margin: 10px;
                padding: 10px;
                border: 3px solid black;
                
            }
        </style>
    </head>
    <body>
        <h1>Grid </h1>
        <div class="container">
            
            <div>item 1 ilove you</div>
            <div>item 2  ilove you </div>
            <div>item 3 ilove you</div>
            <div>item 4 ilove you</div>
                <div>item 5 ilove you</div>
            <div>item 6  ilove you </div>
            <div>item 7 ilove you</div>
            <div>item 8 ilove you</div>
        </div>
    </body>
</html>
