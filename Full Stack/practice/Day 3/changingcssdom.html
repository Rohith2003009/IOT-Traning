<!DOCTYPE html>
<html>
    <body>
        <h1 id="heading">Hello students!!</h1>
        <button onclick="changeColor()">Change Color</button>
        <script>
            function changeColor() {
                let element = document.getElementById("heading");
                element.style.color = "red";
                element.style.backgroundColor = "yellow";
            }
        </script>
    </body>
</html>
